services:
  - type: web
    name: quantanalyzer
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEFAULT_WATCHLIST
        value: ADBE,NOW,MSFT,AAPL,GOOGL,META,NVDA,AMD,CRM,ORCL
      - key: CACHE_TTL_SECONDS
        value: "900"
      - key: PYTHON_VERSION
        value: 3.12.10
